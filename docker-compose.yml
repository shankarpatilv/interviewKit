services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: interviewkit-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interviewkit}
      POSTGRES_USER: ${POSTGRES_USER:-interviewkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewkit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-interviewkit} -d ${POSTGRES_DB:-interviewkit}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
